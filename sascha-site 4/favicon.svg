<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D5A0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7A6130;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" fill="#080808"/>

  <!-- SG letters filling the entire square -->
  <text
    x="32"
    y="50"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="46"
    font-weight="400"
    font-style="italic"
    text-anchor="middle"
    fill="url(#goldGrad)"
    letter-spacing="1"
  >SG</text>

</svg>
